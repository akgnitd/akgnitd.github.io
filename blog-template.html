<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{TITLE} — Atul Gupta</title>
  <meta name="description" content="{DESCRIPTION}" />
  <meta name="robots" content="noindex, nofollow" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://akgnitd.github.io/blogs/{SLUG}.html" />
  <meta property="og:title" content="{TITLE} — Atul Gupta" />
  <meta property="og:description" content="{DESCRIPTION}" />
  <meta property="og:image" content="https://akgnitd.github.io/assets/images/profile.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://akgnitd.github.io/blogs/{SLUG}.html" />
  <meta property="twitter:title" content="{TITLE} — Atul Gupta" />
  <meta property="twitter:description" content="{DESCRIPTION}" />
  <meta property="twitter:image" content="https://akgnitd.github.io/assets/images/profile.jpg" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{TITLE}",
    "description": "{DESCRIPTION}",
    "author": {
      "@type": "Person",
      "name": "Atul Gupta",
      "url": "https://akgnitd.github.io/"
    },
    "datePublished": "{YYYY-MM-DD}",
    "image": "https://akgnitd.github.io/assets/images/profile.jpg"
  }
  </script>

  <meta name="theme-color" content="#05070a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>

<a href="#main" class="skip-to-content">Skip to main content</a>
<div class="reading-progress" id="readingProgress"></div>
<canvas id="bg-canvas" class="bg-canvas"></canvas>

<!-- Copy nav from any blog post file, then change content below -->
<nav class="navbar" id="navbar">
  <div class="container">
    <a href="../index.html" class="nav-logo">atul<span>.</span></a>
    <div class="nav-links" id="navLinks">
      <a href="../index.html#about">About</a>
      <a href="../index.html#skills">Skills</a>
      <a href="../index.html#projects">Projects</a>
      <a href="../blog.html" class="active">Blog</a>
      <a href="../index.html#contact">Contact</a>
    </div>
    <div class="nav-actions">
      <!-- <a href="../resume.pdf" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Resume
      </a> -->
      <button id="bgSwitcher" class="btn" style="padding: 0.5rem 0.9rem; margin-right: 0.5rem;" onclick="window.toggleBackgroundMode && window.toggleBackgroundMode()" title="Cycle Background Animation">🌍</button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
      </button>
      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
<div class="mobile-overlay" id="mobileOverlay"></div>

<main id="main" class="blog-post-page">
  <div class="blog-post-header">
    <a href="../blog.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Back to Blog
    </a>
    <p class="post-meta">{DATE} · {READING_TIME} read</p>
    <h1>{TITLE}</h1>
  </div>

  <article class="blog-post-content">
    {CONTENT}
  </article>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-left"><p>&copy; 2026 Atul Gupta. Built with ❤️</p></div>
    <div class="footer-links">
      <a href="https://github.com/akgnitd" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://linkedin.com/in/akgnitd" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <!-- <a href="../resume.pdf" target="_blank" rel="noopener noreferrer">Resume</a> -->
    </div>
  </div>
</footer>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/backgrounds.js"></script>
</body>
</html>
