<script>
(function() {
  'use strict';

  // ---- Theme ----
  const themeToggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // ---- Navbar ----
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 50), { passive: true });

  // ---- Mobile menu ----
  const menuToggle = document.getElementById('menuToggle');
  const navLinks = document.getElementById('navLinks');
  const overlay = document.getElementById('mobileOverlay');
  function closeMenu() { navLinks.classList.remove('open'); menuToggle.classList.remove('active'); overlay.classList.remove('active'); }
  menuToggle.addEventListener('click', () => { const o = navLinks.classList.toggle('open'); menuToggle.classList.toggle('active', o); overlay.classList.toggle('active', o); });
  overlay.addEventListener('click', closeMenu);
  navLinks.querySelectorAll('a').forEach(l => l.addEventListener('click', closeMenu));

  // ---- Scroll reveal ----
  const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // ---- Blog listing with tag filter (inline data to avoid CORS on file://) ----
  const grid = document.getElementById('blogGrid');
  const filterContainer = document.getElementById('blogFilter');

  const allPosts = [
    {
      "title": "Scaling with Golang",
      "date": "2026-03-21",
      "excerpt": "A deep dive into why we transitioned our mission-critical validation engines to Go — achieving a 40% reduction in P99 latency through lightweight goroutines and efficient memory management.",
      "tags": ["Golang", "Performance", "Backend", "Architecture"],
      "url": "blogs/scaling-with-golang.html",
      "readingTime": "6 min"
    },
    {
      "title": "NLP in FinTech",
      "date": "2026-03-15",
      "excerpt": "How we utilize Natural Language Processing to automate risk assessment — implementing custom NER models with Python and spaCy to increase document processing throughput by 3x.",
      "tags": ["AI", "NLP", "Python", "FinTech"],
      "url": "blogs/nlp-in-fintech.html",
      "readingTime": "8 min"
    },
    {
      "title": "The EM Shift",
      "date": "2026-03-10",
      "excerpt": "Reflections on transitioning from Staff Engineer to Engineering Manager — balancing technical debt with feature delivery and empowering teams to build sustainable solutions.",
      "tags": ["Leadership", "Engineering-Management", "Career"],
      "url": "blogs/the-em-shift.html",
      "readingTime": "5 min"
    }
  ];

  function renderCards(posts) {
    grid.innerHTML = '';
    if (!posts.length) {
      grid.innerHTML = '<p style="color: var(--color-text-muted); text-align:center; grid-column:1/-1;">No posts found.</p>';
      return;
    }
    posts.forEach((post, i) => {
      const card = document.createElement('a');
      card.href = post.url;
      card.className = 'blog-card reveal visible';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <span class="blog-date">${new Date(post.date).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })} · ${post.readingTime} read</span>
        <h3>${post.title}</h3>
        <p class="blog-excerpt">${post.excerpt}</p>
        <div class="blog-tags">${post.tags.map(t => `<span>${t}</span>`).join('')}</div>
        <span class="read-more">Read article <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
      `;
      grid.appendChild(card);
    });
  }

  renderCards(allPosts);

  // Build unique tags
  const tags = [...new Set(allPosts.flatMap(p => p.tags))].sort();
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.textContent = tag;
    btn.setAttribute('data-tag', tag);
    filterContainer.appendChild(btn);
  });

  // Filter click handler
  filterContainer.addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    filterContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const tag = e.target.getAttribute('data-tag');
    renderCards(tag === 'all' ? allPosts : allPosts.filter(p => p.tags.includes(tag)));
  });
})();
</script>
